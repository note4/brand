name: Sync Multi-Size Favicons

on:
  schedule:
    - cron: '0 16 * * *'
  push:
    paths:
      - 'siteurl.txt'
      - 'requirements.txt'
      - 'update_favicons.py'
      - '.github/workflows/sync_icons.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install and Run
        run: |
          # 1. 创建虚拟环境
          python -m venv venv
          
          # 2. 升级并安装依赖 (直接使用 venv 内部的 pip 路径)
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/python -m pip install -r requirements.txt
          
          # 3. 运行脚本 (直接使用 venv 内部的 python 路径)
          ./venv/bin/python update_favicons.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 确保只添加图标目录，排除 venv 文件夹
          git add favicon/
          
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: 自动同步网站图标 $(date +'%Y-%m-%d')"
            git push origin main
          fi